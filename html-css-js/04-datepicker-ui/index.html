<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datepicker UI</title>

    <style> 
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body{
        display:flex;
        justify-content: space-around;
        align-items: center;
        height: 100vh;
        font-family: sans-serif;
    }

        .input{
            height: 30px;
            padding: 0 10px;
            width: 250px;
            display: flex;
            align-items: center;
            font-weight: bold;
            border: 2px solid black;
        }

        .picker{
            margin-top: 10px;
            width: 250px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            border: 2px solid black;
        }

        .picker > p{
            padding: 10px;
        }

        table{
            margin-top: 5px;
            width: 100%;
                        border-collapse: collapse;
        }

        tr:not(:last-child){
            border-bottom: 1px solid black;
        }

        #table-header{
            border-bottom: 2px solid black;
        }

        td{
            padding: 10px 5px;
            text-align: right;
        }

        tr > td:not(:last-child){
            border-right: 1px solid black;
        }

        th{
            font-weight: normal;
        }

    </style>
</head>
<body>
    <main>
        <div class="input">
        <p>dd / mm / yyyy</p>
    </div>

    <div class="picker">
        <p>  ◀     December 2022     ▶</p>
        <table>
            <tr id="table-header">
                <th>S</th>
                <th>M</th>
                <th>T</th>
                <th>W</th>
                <th>T</th>
                <th>F</th>
                <th>S</th>
            </tr>
            <tr>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td>1</td>
                <td>2</td>
                <td>3</td>
            </tr>
            <tr>
                <td>4</td>
                <td>5</td>
                <td>6</td>
                <td>7</td>
                <td>8</td>
                <td>9</td>
                <td>10</td>
            </tr>
            <tr>
                <td>11</td>
                <td>12</td>
                <td>13</td>
                <td>14</td>
                <td>15</td>
                <td>16</td>
                <td>17</td>
            </tr>
            <tr>
                <td>18</td>
                <td>19</td>
                <td>20</td>
                <td>21</td>
                <td>22</td>
                <td>23</td>
                <td>24</td>
            </tr>
            <tr>
                <td>25</td>
                <td>26</td>
                <td>27</td>
                <td>28</td>
                <td>29</td>
                <td>30</td>
                <td>31</td>
            </tr>
        </table>
    </div>
    </main>
</body>
</html>
